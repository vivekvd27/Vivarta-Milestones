<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/tokens/fonts.css">
<link rel="stylesheet" href="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/tokens/colors.css">
<link rel="stylesheet" href="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/tokens/typography.css">
<link rel="stylesheet" href="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/tokens/spacing.css">
<link rel="stylesheet" href="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/tokens/effects.css">
<link rel="stylesheet" href="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/tokens/a11y.css">
<link rel="stylesheet" href="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/tokens/responsive.css">
<link rel="stylesheet" href="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/styles.css">
<script src="_ds/peopleos-design-system-eb8f2f86-14a4-48cc-83af-9a52f0d483e6/_ds_bundle.js"></script>
<script>try{if(localStorage.getItem('peopleos_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap">
<link rel="stylesheet" href="styles/theme.css">
<link rel="stylesheet" href="styles/login.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);}
  .vv-app{--pa:var(--orange);--pa-strong:var(--orange-deep);}
  [data-theme="dark"] .vv-app{--pa-strong:var(--orange);}
</style>
</helmet>
<div class="vv-app" style="display:block;height:100vh;">{{ app }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    mode: 'signin',        // signin | signup | reset | sent
    dark: false,
    showPw: false,
    remember: true,
    email: '',
    password: '',
    name: '',
  };

  componentDidMount() {
    this.setState({ dark: document.documentElement.getAttribute('data-theme') === 'dark' });
    if (window.PeopleOSDesignSystem_eb8f2f) this.forceUpdate();
    else { this._poll = setInterval(() => { if (window.PeopleOSDesignSystem_eb8f2f) { clearInterval(this._poll); this.forceUpdate(); } }, 40); }
  }
  componentWillUnmount() { if (this._poll) clearInterval(this._poll); }

  toggleTheme() {
    const next = !this.state.dark; this.setState({ dark: next });
    document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');
    try { localStorage.setItem('peopleos_theme', next ? 'dark' : 'light'); } catch (e) {}
  }
  setMode(m) { this.setState({ mode: m, showPw: false }); }
  set(k, v) { this.setState({ [k]: v }); }
  submit() {
    if (this.state.mode === 'reset') { this.setState({ mode: 'sent' }); return; }
    // Design mock — real Supabase auth is wired in the app codebase.
    try { localStorage.setItem('peopleos_theme', this.state.dark ? 'dark' : 'light'); } catch (e) {}
    window.location.href = 'index.html';
  }

  /* ---- icons ---- */
  ic(name, s) {
    const h = React.createElement;
    const p = (d, k) => h('path', { d, key: k });
    const ci = (cx, cy, r, k) => h('circle', { cx, cy, r, key: k });
    const M = {
      mail: [h('rect', { x: 3, y: 5, width: 18, height: 14, rx: 2, key: 1 }), p('m3 7 9 6 9-6', 2)],
      lock: [h('rect', { x: 4.5, y: 10.5, width: 15, height: 10, rx: 2, key: 1 }), p('M8 10.5V8a4 4 0 0 1 8 0v2.5', 2)],
      user: [ci(12, 8, 3.6, 1), p('M5 20a7 7 0 0 1 14 0', 2)],
      eye: [p('M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z', 1), ci(12, 12, 3, 2)],
      eyeoff: [p('M9.9 5.2A9.5 9.5 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.2 4M6.2 6.2A17 17 0 0 0 2 12s3.5 7 10 7a9.5 9.5 0 0 0 3.9-.8', 1), p('M4 4l16 16', 2)],
      sun: [ci(12, 12, 4.3, 1), p('M12 2v2.4M12 19.6V22M2 12h2.4M19.6 12H22M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7', 2)],
      moon: [p('M20 14.5A8 8 0 1 1 9.5 4 6.5 6.5 0 0 0 20 14.5Z', 1)],
      check: [p('M5 12.5 10 17l9-10', 1)],
      back: [p('M15 5l-7 7 7 7', 1)],
      team: [ci(9, 8, 3, 1), p('M3.5 20a5.5 5.5 0 0 1 11 0', 2), p('M16 5.2a3.2 3.2 0 0 1 0 6.2', 3), p('M17.5 20a5.5 5.5 0 0 0-2.3-4.5', 4)],
      sent: [p('M4 5h16v14H4zM4 6l8 6 8-6', 1)],
    };
    return h('svg', { viewBox: '0 0 24 24', width: s || 18, height: s || 18, fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', style: { flex: 'none' } }, M[name]);
  }
  mark(s) {
    const h = React.createElement;
    s = s || 34;
    return h('svg', { width: s, height: s, viewBox: '36 36 82 82', fill: 'none', style: { flex: 'none' } }, [
      h('path', { d: 'M76 112 A36 36 0 1 1 112 76', stroke: '#fff', strokeWidth: 5.5, strokeLinecap: 'round', key: 1 }),
      h('path', { d: 'M50 76 A26 26 0 0 1 102 76', stroke: '#93A1B4', strokeWidth: 5.5, strokeLinecap: 'round', key: 2 }),
      h('path', { d: 'M76 60 A16 16 0 0 1 92 76', stroke: '#66768E', strokeWidth: 5.5, strokeLinecap: 'round', key: 3 }),
      h('circle', { cx: 76, cy: 76, r: 7, fill: 'var(--orange)', key: 4 }),
    ]);
  }
  rings() {
    const h = React.createElement;
    return h('svg', { className: 'lg-brand-rings', viewBox: '0 0 200 200', fill: 'none' }, [
      h('circle', { cx: 100, cy: 100, r: 90, stroke: '#fff', strokeWidth: 2, key: 1 }),
      h('circle', { cx: 100, cy: 100, r: 64, stroke: '#fff', strokeWidth: 2, key: 2 }),
      h('circle', { cx: 100, cy: 100, r: 38, stroke: '#fff', strokeWidth: 2, key: 3 }),
      h('circle', { cx: 100, cy: 100, r: 12, fill: 'var(--orange)', key: 4 }),
    ]);
  }

  brandPanel() {
    const h = React.createElement;
    return h('aside', { className: 'lg-brand' }, [
      this.rings(),
      h('div', { className: 'lg-brand-noise', key: 'n' }),
      h('div', { className: 'lg-brand-top', key: 'top' }, [
        this.mark(34),
        h('div', { key: 't' }, [h('div', { className: 'lg-wm', key: 1 }, 'Vivartam'), h('div', { className: 'lg-mod', key: 2 }, 'Founder OS')]),
      ]),
      h('div', { className: 'lg-brand-mid', key: 'mid' }, [
        h('div', { className: 'lg-eyebrow', key: 'e' }, 'North star'),
        h('h1', { className: 'lg-headline', key: 'h' }, ['Build Vivartam Tech to ', h('mark', { key: 'm' }, '\u20b91 Cr'), ' revenue.']),
        h('p', { className: 'lg-sub', key: 's' }, 'One place for our habits, milestones, network and the vision we\u2019re manifesting \u2014 for the founders and the team building it.'),
      ]),
      h('div', { className: 'lg-affirm', key: 'aff' }, [
        h('div', { className: 'lg-affirm-q', key: 'q' }, '\u201cEverything happens twice \u2014 first in the mind, then in reality.\u201d'),
        h('div', { className: 'lg-affirm-by', key: 'b' }, 'Daily affirmation \u00b7 Vivek & Mirat'),
      ]),
      h('div', { className: 'lg-brand-foot', key: 'f' }, 'Vivartam Tech Private Limited'),
    ]);
  }

  field(DS, label, key, type, icon, placeholder) {
    const h = React.createElement;
    const isPw = type === 'password';
    const realType = isPw && this.state.showPw ? 'text' : type;
    return h('div', { className: 'lg-field', key: key }, [
      h('label', { className: 'lg-label', key: 'l' }, label),
      h('div', { className: 'lg-inwrap', key: 'w' }, [
        h('input', {
          className: 'lg-in' + (isPw ? ' has-icon' : ''), type: realType, placeholder: placeholder,
          value: this.state[key], onChange: e => this.set(key, e.target.value),
          onKeyDown: e => { if (e.key === 'Enter') this.submit(); }, key: 'i',
        }),
        isPw ? h('button', { className: 'lg-eye', onClick: () => this.set('showPw', !this.state.showPw), type: 'button', key: 'e', title: 'Show/hide' }, this.ic(this.state.showPw ? 'eyeoff' : 'eye', 18)) : null,
      ]),
    ]);
  }

  formPanel(DS) {
    const h = React.createElement;
    const m = this.state.mode;
    const heads = {
      signin: ['Welcome back', 'Sign in to your Vivartam workspace.'],
      signup: ['Create your account', 'Join the Vivartam founders & team.'],
      reset: ['Reset your password', 'We\u2019ll email you a secure reset link.'],
      sent: ['Check your inbox', 'A reset link is on its way.'],
    };
    const head = heads[m];
    let body;
    if (m === 'sent') {
      body = h('div', { className: 'lg-sent', key: 'sent' }, [
        h('div', { className: 'lg-sent-ic', key: 'i' }, this.ic('sent', 26)),
        h('div', { key: 't', style: { fontSize: '14px', color: 'var(--text-muted)', lineHeight: 1.5 } }, ['We sent a reset link to ', h('strong', { key: 's', style: { color: 'var(--text)' } }, this.state.email || 'your email'), '. Follow it to set a new password.']),
        h(DS.Button, { variant: 'accent', size: 'lg', onClick: () => this.setMode('signin'), key: 'b' }, 'Back to sign in'),
      ]);
    } else if (m === 'reset') {
      body = h('div', { key: 'reset' }, [
        h('button', { className: 'lg-back', onClick: () => this.setMode('signin'), key: 'back' }, [this.ic('back', 15), 'Back to sign in']),
        this.field(DS, 'Email', 'email', 'email', 'mail', 'you@vivartam.com'),
        h('div', { style: { height: '6px' }, key: 'sp' }),
        h(DS.Button, { variant: 'accent', size: 'lg', onClick: () => this.submit(), className: 'lg-submit', key: 'sub' }, 'Send reset link'),
      ]);
    } else {
      const isSignup = m === 'signup';
      body = h('div', { key: 'form' }, [
        isSignup ? this.field(DS, 'Full name', 'name', 'text', 'user', 'Vivek Dagur') : null,
        this.field(DS, 'Work email', 'email', 'email', 'mail', 'you@vivartam.com'),
        this.field(DS, 'Password', 'password', 'password', 'lock', isSignup ? 'Create a password' : 'Enter your password'),
        h('div', { className: 'lg-row', key: 'row' }, [
          h('div', { className: 'lg-check', onClick: () => this.set('remember', !this.state.remember), key: 'c' }, [
            h('span', { className: 'lg-checkbox' + (this.state.remember ? ' on' : ''), key: 'b' }, this.state.remember ? this.ic('check', 12) : null),
            isSignup ? 'I agree to the team policy' : 'Keep me signed in',
          ]),
          !isSignup ? h('button', { className: 'lg-link', onClick: () => this.setMode('reset'), key: 'f' }, 'Forgot password?') : null,
        ]),
        h(DS.Button, { variant: 'accent', size: 'lg', onClick: () => this.submit(), className: 'lg-submit', key: 'sub' }, isSignup ? 'Create account' : 'Sign in'),
        h('div', { className: 'lg-divider', key: 'd' }, 'or'),
        h('button', { className: 'lg-oauth', onClick: () => this.submit(), key: 'g' }, [this.googleG(), 'Continue with Google']),
        h('div', { className: 'lg-switch', key: 'sw' }, isSignup
          ? ['Already have an account? ', h('button', { onClick: () => this.setMode('signin'), key: 'b' }, 'Sign in')]
          : ['New to Vivartam? ', h('button', { onClick: () => this.setMode('signup'), key: 'b' }, 'Create an account')]),
      ]);
    }
    return h('div', { className: 'lg-form-wrap' }, [
      h('div', { className: 'lg-toggle', key: 'tg' }, h('button', { onClick: () => this.toggleTheme(), title: 'Toggle theme' }, this.ic(this.state.dark ? 'sun' : 'moon', 18))),
      h('div', { className: 'lg-card', key: 'card' }, [
        h('div', { className: 'lg-mobilemark', key: 'mm' }, [this.markDark(28), h('div', { key: 't' }, [h('div', { style: { fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '18px', letterSpacing: '-.02em', color: 'var(--text)' }, key: 1 }, 'Vivartam'), h('div', { style: { fontFamily: 'var(--font-mono)', fontSize: '9px', letterSpacing: '.18em', textTransform: 'uppercase', color: 'var(--text-subtle)' }, key: 2 }, 'Founder OS')])]),
        h('h2', { className: 'lg-h1', key: 'h' }, head[0]),
        h('p', { className: 'lg-p', key: 'p' }, head[1]),
        body,
      ]),
    ]);
  }

  markDark(s) {
    const h = React.createElement;
    return h('svg', { width: s, height: s, viewBox: '36 36 82 82', fill: 'none', style: { flex: 'none' } }, [
      h('path', { d: 'M76 112 A36 36 0 1 1 112 76', stroke: 'var(--primary)', strokeWidth: 5.5, strokeLinecap: 'round', key: 1 }),
      h('path', { d: 'M50 76 A26 26 0 0 1 102 76', stroke: 'var(--steel)', strokeWidth: 5.5, strokeLinecap: 'round', key: 2 }),
      h('circle', { cx: 76, cy: 76, r: 7, fill: 'var(--orange)', key: 4 }),
    ]);
  }

  renderApp() {
    const h = React.createElement;
    const DS = window.PeopleOSDesignSystem_eb8f2f;
    if (!DS) return h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: 'var(--text-subtle)', fontFamily: 'var(--font-mono)', fontSize: '12px', letterSpacing: '.1em', textTransform: 'uppercase' } }, 'Loading\u2026');
    return h('div', { className: 'lg-app' }, [this.brandPanel(), this.formPanel(DS)]);
  }

  googleG() {
    const h = React.createElement;
    return h('svg', { width: 18, height: 18, viewBox: '0 0 48 48', style: { flex: 'none' } }, [
      h('path', { fill: '#FFC107', d: 'M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8a12 12 0 1 1 7.9-21l5.7-5.7A20 20 0 1 0 24 44c11 0 20-8 20-20 0-1.3-.1-2.3-.4-3.5z', key: 1 }),
      h('path', { fill: '#FF3D00', d: 'M6.3 14.7l6.6 4.8A12 12 0 0 1 24 12c3.1 0 5.8 1.2 7.9 3l5.7-5.7A20 20 0 0 0 6.3 14.7z', key: 2 }),
      h('path', { fill: '#4CAF50', d: 'M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2A12 12 0 0 1 12.7 28l-6.5 5A20 20 0 0 0 24 44z', key: 3 }),
      h('path', { fill: '#1976D2', d: 'M43.6 20.5H42V20H24v8h11.3a12 12 0 0 1-4.1 5.6l6.2 5.2C33.6 41.2 44 36 44 24c0-1.3-.1-2.3-.4-3.5z', key: 4 }),
    ]);
  }

  renderVals() {
    void this.state.mode; void this.state.dark; void this.state.showPw; void this.state.remember;
    void this.state.email; void this.state.password; void this.state.name;
    return { app: this.renderApp() };
  }
}
</script>
</body>
</html>
