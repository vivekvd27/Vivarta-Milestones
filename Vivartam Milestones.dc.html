<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    layout: (() => { try { return localStorage.getItem('vivarta_layout') || 'A'; } catch (e) { return 'A'; } })(),
    nav: (() => { try { return (window.VV_AUTH && window.VV_AUTH.isFounder) ? 'overview' : 'habits'; } catch (e) { return 'habits'; } })(),
    dark: false,
    q: '',
    meetingDone: {},
    // Per-habit stage: 'todo' | 'wip' (work in progress) | 'done'. Absent = 'todo'.
    habitStatus: { 'vivek:workout': 'done', 'vivek:meditation': 'done', 'vivek:reading': 'done', 'vivek:pranayama': 'done', 'vivek:diary': 'done', 'vivek:cad': 'done', 'vivek:nvidia': 'done', 'vivek:newspaper': 'wip', 'vivek:flute': 'wip', 'mirat:workout': 'done', 'mirat:reading': 'done', 'mirat:diary': 'done', 'mirat:nvidia': 'done', 'mirat:events': 'done', 'mirat:newspaper': 'wip' },
    rule3Done: { 'vivek:0': true, 'mirat:0': true, 'mirat:1': true },
    habitRange: 'day',
    habitDayView: (() => { try { return localStorage.getItem('vivartam_habit_dayview') || 'card'; } catch (e) { return 'card'; } })(),
    dragHabit: null, // {k,id} of the kanban card being dragged
    dragOver: null,  // "<founderKey>:<stage>" lane currently hovered during a drag
    visionFilter: 'All',
    visionFocus: null,
    contactDone: {},
    netStatus: 'all',
    netInterest: 'All',
    contactDetail: null,
    futureTab: 'mine',
    discoverRing: 'all',
    showAddEvent: false,
    newEvent: { title: '', date: '', location: 'Ahmedabad', priority: 'medium', prep: '', owner: 'both' },
    userEvents: (() => { try { return JSON.parse(localStorage.getItem('vivartam_events') || '[]'); } catch (e) { return []; } })(),
    savedDiscover: (() => { try { return JSON.parse(localStorage.getItem('vivartam_saved_events') || '{}'); } catch (e) { return {}; } })(),
    mentorNotes: (() => { try { return JSON.parse(localStorage.getItem('vivartam_mentor_notes') || '{}'); } catch (e) { return {}; } })(),
    editSession: null,
    draftNotes: '',
    draftLearning: '',
    draftTitle: '',
    showAllSessions: false,
    meetTrack: 'rohan',
    tracks: (() => { try { return JSON.parse(localStorage.getItem('vivartam_tracks') || '[]'); } catch (e) { return []; } })(),
    meetingNotes: (() => { try { return JSON.parse(localStorage.getItem('vivartam_meeting_notes') || '{}'); } catch (e) { return {}; } })(),
    editKey: null,
    showAddTrack: false,
    newTrack: { name: '', role: '', kind: 'person', cadence: '14', anchor: '' },
    showLogMeeting: false,
    newMeeting: { date: '', title: '', notes: '', learning: '' },
    affirmItems: (() => { try { return JSON.parse(localStorage.getItem('vivartam_affirmations') || '{}'); } catch (e) { return {}; } })(),
    editAff: null,
    draftAff: '',
    affirmReviewed: (() => { try { return localStorage.getItem('vivartam_affirm_reviewed') || ''; } catch (e) { return ''; } })(),
    dsReady: false,
  };

  componentDidMount() {
    this.setState({ dark: document.documentElement.getAttribute('data-theme') === 'dark' });
    if (window.PeopleOSDesignSystem_eb8f2f) { this.setState({ dsReady: true }); }
    else { this._poll = setInterval(() => { if (window.PeopleOSDesignSystem_eb8f2f) { clearInterval(this._poll); this.setState({ dsReady: true }); } }, 40); }
  }
  componentWillUnmount() { if (this._poll) clearInterval(this._poll); }

  /* ---------------- data ---------------- */
  get data() { return window.VIVARTAM.data; }
  get TODAY() { return new Date('2026-06-24T00:00:00'); }

  /* ---------------- helpers ---------------- */
  fmt(d) { return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' }); }
  fmtShort(d) { return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { month: 'short', day: 'numeric' }); }
  daysUntil(d) { return Math.ceil((new Date(d + 'T00:00:00') - this.TODAY) / 86400000); }
  isDone(m) { const o = this.state.meetingDone[m.id]; return o === undefined ? m.status === 'completed' : o; }
  toggleMeeting(m) { this.setState(s => ({ meetingDone: Object.assign({}, s.meetingDone, { [m.id]: !this.isDone(m) }) })); }
  setLayout(l) { this.setState({ layout: l }); try { localStorage.setItem('vivarta_layout', l); } catch (e) {} }
  toggleTheme() {
    const next = !this.state.dark; this.setState({ dark: next });
    document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');
    try { localStorage.setItem('peopleos_theme', next ? 'dark' : 'light'); } catch (e) {}
  }

  /* ---------------- icons ---------------- */
  get I() {
    const h = React.createElement;
    const p = (d, k) => h('path', { d, key: k });
    const ci = (cx, cy, r, k) => h('circle', { cx, cy, r, key: k });
    const svg = (kids, s) => h('svg', { viewBox: '0 0 24 24', width: s || 18, height: s || 18, fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' }, kids);
    return {
      overview: (s) => svg([h('rect', { x: 3, y: 3, width: 7.5, height: 7.5, rx: 1.6, key: 1 }), h('rect', { x: 13.5, y: 3, width: 7.5, height: 7.5, rx: 1.6, key: 2 }), h('rect', { x: 3, y: 13.5, width: 7.5, height: 7.5, rx: 1.6, key: 3 }), h('rect', { x: 13.5, y: 13.5, width: 7.5, height: 7.5, rx: 1.6, key: 4 })], s),
      timeline: (s) => svg([p('M5 22V3', 1), p('M5 4h11.5l-2.2 3.2L16.5 10.5H5', 2)], s),
      meetings: (s) => svg([h('rect', { x: 3, y: 4.5, width: 18, height: 16, rx: 2, key: 1 }), p('M3 9h18M8 2.5v4M16 2.5v4', 2)], s),
      network: (s) => svg([ci(9, 8, 3.2, 1), p('M3.5 20a5.5 5.5 0 0 1 11 0', 2), p('M16 5.2a3.2 3.2 0 0 1 0 6.2', 3), p('M17.5 20a5.5 5.5 0 0 0-2.3-4.5', 4)], s),
      future: (s) => svg([ci(12, 12, 9, 1), ci(12, 12, 5, 2), ci(12, 12, 1.4, 3)], s),
      settings: (s) => svg([ci(12, 12, 3, 1), p('M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.3 1a7 7 0 0 0-2-1.2L16.2 2h-4l-.4 2.4a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.6A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.2l-2 1.6 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.4 2.4h4l.4-2.4a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.6A7 7 0 0 0 19 12Z', 2)], s),
      bell: (s) => svg([p('M10.3 21a2 2 0 0 0 3.4 0', 1), p('M3.3 15.4a1 1 0 0 0 .7 1.6h16a1 1 0 0 0 .7-1.6C19.4 14 18 12.4 18 8A6 6 0 0 0 6 8c0 4.4-1.4 6-2.7 7.4', 2)], s),
      search: (s) => svg([ci(11, 11, 7, 1), p('m21 21-4.3-4.3', 2)], s),
      plus: (s) => svg([p('M12 5v14M5 12h14', 1)], s),
      check: (s) => svg([p('M5 12.5 10 17l9-10', 1)], s),
      chevron: (s) => svg([p('m9 6 6 6-6 6', 1)], s),
      bolt: (s) => svg([p('M13 2 4 14h7l-1 8 9-12h-7l1-8Z', 1)], s),
      clock: (s) => svg([ci(12, 12, 9, 1), p('M12 7v5l3 2', 2)], s),
      sun: (s) => svg([ci(12, 12, 4.3, 1), p('M12 2v2.4M12 19.6V22M2 12h2.4M19.6 12H22M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7', 2)], s),
      moon: (s) => svg([p('M20 14.5A8 8 0 1 1 9.5 4 6.5 6.5 0 0 0 20 14.5Z', 1)], s),
      habits: (s) => svg([ci(12, 12, 9, 1), p('M8.4 12.4 11 15l4.6-5.2', 2)], s),
      vision: (s) => svg([p('M12 3l1.7 5.1 5.3.1-4.3 3.1 1.6 5.1L12 14.4 7.7 16.5l1.6-5.1-4.3-3.1 5.3-.1z', 1)], s),
      bulbNav: (s) => svg([p('M9 18h6M10 21h4', 1), p('M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.5 1 2.5h6c0-1 .4-1.9 1-2.5A6 6 0 0 0 12 3Z', 2)], s),
    };
  }


  /* ---------------- pieces ---------------- */
  mark(s) {
    const h = React.createElement;
    s = s || 30;
    return h('svg', { width: s, height: s, viewBox: '36 36 82 82', fill: 'none', style: { flex: 'none' } }, [
      h('path', { d: 'M76 112 A36 36 0 1 1 112 76', stroke: '#fff', strokeWidth: 5.5, strokeLinecap: 'round', key: 1 }),
      h('path', { d: 'M50 76 A26 26 0 0 1 102 76', stroke: '#93A1B4', strokeWidth: 5.5, strokeLinecap: 'round', key: 2 }),
      h('path', { d: 'M76 60 A16 16 0 0 1 92 76', stroke: '#66768E', strokeWidth: 5.5, strokeLinecap: 'round', key: 3 }),
      h('circle', { cx: 76, cy: 76, r: 7, fill: '#F2A024', key: 4 }),
    ]);
  }

  priColor(p) { return p === 'high' ? 'var(--danger)' : p === 'medium' ? 'var(--orange)' : 'var(--steel)'; }
  priLabel(p) { return p === 'high' ? 'Critical' : p === 'medium' ? 'Important' : 'Upcoming'; }

  sectionHead(DS, icon, title, count, accent) {
    const h = React.createElement;
    return h('div', { className: 'vv-sec-h' }, [
      h('div', { className: 'vv-sec-ic', style: { background: accent.bg, color: accent.fg }, key: 'i' }, icon),
      h('h2', { key: 'h' }, title),
      count != null ? h('span', { className: 'cnt', key: 'c' }, count) : null,
    ]);
  }

  /* ---------------- widgets ---------------- */
  timelineCard(DS, opts) {
    const h = React.createElement, I = this.I;
    const events = [...this.data.timeline].sort((a, b) => new Date(b.date) - new Date(a.date));
    const list = (opts && opts.full) ? events : events.slice(0, 5);
    const rows = list.map(ev => {
      const major = ev.type === 'major';
      return h('div', { className: 'ev', key: ev.id }, [
        h('div', { className: 'dot', style: { background: major ? 'var(--orange)' : 'var(--gray-400)' }, key: 'd' }),
        h('div', { className: 'card' + (major ? ' major' : ''), key: 'c' }, [
          h('div', { className: 't', key: 1 }, ev.title),
          h('div', { className: 'meta', key: 2 }, [
            h('span', { className: 'date', key: 'a' }, this.fmt(ev.date)),
            h(DS.Badge, { tone: major ? 'amber' : 'neutral', size: 'sm', key: 'b' }, major ? 'Major' : 'Minor'),
          ]),
          ev.desc ? h('div', { className: 'desc', key: 3 }, ev.desc) : null,
        ]),
      ]);
    });
    return h(DS.Card, { padding: 'lg' }, [
      this.sectionHead(DS, I.timeline(18), 'Milestone timeline', events.length + ' events', { bg: 'var(--orange-tint)', fg: 'var(--orange-deep)' }),
      h('div', { className: 'vv-tl', key: 'tl' }, [h('div', { className: 'line', key: 'l' }), ...rows]),
    ]);
  }

  /* ---------------- future events: discovery feed ---------------- */
  get discoverRings() { return window.VIVARTAM.discoverRings; }
  get discoverEvents() { return window.VIVARTAM.discoverEvents; }
  get incubators() { return window.VIVARTAM.incubators; }
  isSaved(id) { return !!this.state.savedDiscover[id]; }
  toggleSave(ev) {
    const id = ev.id;
    this.setState(s => {
      const sv = Object.assign({}, s.savedDiscover);
      if (sv[id]) delete sv[id]; else sv[id] = { title: ev.title, date: ev.date, location: ev.city, org: ev.org };
      try { localStorage.setItem('vivartam_saved_events', JSON.stringify(sv)); } catch (e) {}
      return { savedDiscover: sv };
    });
  }
  allMyEvents() {
    const saved = Object.keys(this.state.savedDiscover).map(id => {
      const s = this.state.savedDiscover[id];
      return { id: 'sv-' + id, title: s.title, date: s.date, location: s.location, owner: 'both', priority: 'medium', prep: 'Saved from Discover \u00b7 ' + (s.org || ''), saved: true };
    });
    return [...this.data.future, ...this.state.userEvents, ...saved];
  }
  addEvent() {
    const n = this.state.newEvent;
    if (!n.title.trim() || !n.date) return;
    const ev = { id: 'u' + Date.now(), title: n.title.trim(), date: n.date, priority: n.priority, location: n.location || 'Ahmedabad', owner: n.owner, prep: n.prep.trim(), custom: true };
    this.setState(s => {
      const ue = [...s.userEvents, ev];
      try { localStorage.setItem('vivartam_events', JSON.stringify(ue)); } catch (e) {}
      return { userEvents: ue, showAddEvent: false, newEvent: { title: '', date: '', location: 'Ahmedabad', priority: 'medium', prep: '', owner: 'both' } };
    });
  }
  removeUserEvent(id) {
    this.setState(s => { const ue = s.userEvents.filter(e => e.id !== id); try { localStorage.setItem('vivartam_events', JSON.stringify(ue)); } catch (e) {} return { userEvents: ue }; });
  }
  setNE(k, v) { this.setState(s => ({ newEvent: Object.assign({}, s.newEvent, { [k]: v }) })); }
  ownerMeta(o) { return o === 'vivek' ? { name: 'Vivek Dagur', color: 'var(--steel)', label: 'Vivek' } : o === 'mirat' ? { name: 'Mirat Soni', color: '#8A5CC4', label: 'Mirat' } : { name: 'Both', color: 'var(--pa)', label: 'Both' }; }

  renderFuture(DS) {
    const h = React.createElement, I = this.I;
    const tabs = [['mine', 'Our events'], ['discover', 'Discover'], ['incubators', 'Incubation centres']];
    const tab = this.state.futureTab;
    return h('div', { className: 'vv-fut' }, [
      h('div', { className: 'vv-futtabs', key: 'tabs' }, tabs.map(t => h('button', { key: t[0], className: 'vv-futtab' + (tab === t[0] ? ' on' : ''), onClick: () => this.setState({ futureTab: t[0] }) }, t[1]))),
      tab === 'mine' ? this.futMine(DS) : tab === 'discover' ? this.futDiscover(DS) : this.futIncubators(DS),
    ]);
  }

  futMine(DS) {
    const h = React.createElement, I = this.I;
    const events = this.allMyEvents().sort((a, b) => this.daysUntil(a.date) - this.daysUntil(b.date));
    const groups = ['high', 'medium', 'low'].map(pr => {
      const g = events.filter(e => (e.priority || 'medium') === pr);
      if (!g.length) return null;
      return h('div', { className: 'vv-fgroup', key: pr }, [
        h('div', { className: 'vv-fglabel', style: { color: this.priColor(pr) }, key: 'l' }, [h('span', { className: 'b', style: { background: this.priColor(pr) }, key: 'b' }), this.priLabel(pr)]),
        ...g.map(ev => this.myEventRow(DS, ev)),
      ]);
    });
    return h('div', { key: 'mine' }, [
      h(DS.Card, { padding: 'lg', key: 'add' }, this.state.showAddEvent ? this.addEventForm(DS) : h('div', { className: 'vv-addbar' }, [
        h('div', { key: 't' }, [
          h('div', { style: { fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '16px', letterSpacing: '-.01em' }, key: 1 }, 'Plan a new event'),
          h('div', { style: { fontSize: '13px', color: 'var(--text-muted)', marginTop: '3px' }, key: 2 }, 'Add anything you or Mirat want to attend, host or prep for.'),
        ]),
        h(DS.Button, { variant: 'accent', size: 'md', leadingIcon: I.plus(16), onClick: () => this.setState({ showAddEvent: true }), key: 'b' }, 'Add event'),
      ])),
      h('div', { style: { marginTop: '18px' }, key: 'list' }, groups),
    ]);
  }
  addEventForm(DS) {
    const h = React.createElement;
    const n = this.state.newEvent;
    const owners = [['both', 'Both'], ['vivek', 'Vivek'], ['mirat', 'Mirat']];
    const pris = [['high', 'Critical'], ['medium', 'Important'], ['low', 'Upcoming']];
    const field = (label, node) => h('div', { className: 'vv-field', key: label }, [h('label', { className: 'vv-flabel', key: 'l' }, label), node]);
    return h('div', { className: 'vv-form' }, [
      h('div', { className: 'vv-formhd', key: 'hd' }, [
        h('div', { style: { fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '16px' }, key: 1 }, 'New event'),
        h('button', { className: 'vv-modal-x', style: { position: 'static' }, onClick: () => this.setState({ showAddEvent: false }), key: 2 }, this.hi('x', 16)),
      ]),
      field('Event title', h('input', { className: 'vv-input', value: n.title, placeholder: 'e.g. Coffee with a CHRO', onChange: e => this.setNE('title', e.target.value), key: 'i' })),
      h('div', { className: 'vv-form2', key: 'r1' }, [
        field('Date', h('input', { type: 'date', className: 'vv-input', value: n.date, onChange: e => this.setNE('date', e.target.value), key: 'i' })),
        field('Location', h('input', { className: 'vv-input', value: n.location, placeholder: 'Ahmedabad', onChange: e => this.setNE('location', e.target.value), key: 'i' })),
      ]),
      h('div', { className: 'vv-form2', key: 'r2' }, [
        field('Who', h('div', { className: 'vv-pickrow', key: 'p' }, owners.map(o => h('button', { key: o[0], className: 'vv-pick' + (n.owner === o[0] ? ' on' : ''), onClick: () => this.setNE('owner', o[0]) }, o[1])))),
        field('Priority', h('div', { className: 'vv-pickrow', key: 'p' }, pris.map(o => h('button', { key: o[0], className: 'vv-pick' + (n.priority === o[0] ? ' on' : ''), style: n.priority === o[0] ? { borderColor: this.priColor(o[0]), color: this.priColor(o[0]) } : null, onClick: () => this.setNE('priority', o[0]) }, o[1])))),
      ]),
      field('Prep notes (optional)', h('textarea', { className: 'vv-input', rows: 2, value: n.prep, placeholder: 'What to prepare beforehand\u2026', onChange: e => this.setNE('prep', e.target.value), key: 'i' })),
      h('div', { className: 'vv-formactions', key: 'a' }, [
        h(DS.Button, { variant: 'ghost', size: 'md', onClick: () => this.setState({ showAddEvent: false }), key: 'c' }, 'Cancel'),
        h(DS.Button, { variant: 'accent', size: 'md', onClick: () => this.addEvent(), key: 's' }, 'Add to our events'),
      ]),
    ]);
  }
  myEventRow(DS, ev) {
    const h = React.createElement;
    const days = this.daysUntil(ev.date);
    let tone = 'neutral', label;
    if (days < 0) { tone = 'danger'; label = Math.abs(days) + 'd ago'; }
    else if (days === 0) { tone = 'danger'; label = 'Today'; }
    else if (days <= 3) { tone = 'amber'; label = 'In ' + days + ' days'; }
    else if (days <= 7) { tone = 'warning'; label = 'In ' + days + ' days'; }
    else { tone = 'neutral'; label = 'In ' + days + ' days'; }
    const om = this.ownerMeta(ev.owner);
    return h('div', { className: 'vv-fe', key: ev.id }, [
      h('div', { className: 'bar', style: { background: this.priColor(ev.priority || 'medium') }, key: 'bar' }),

  get rohanTrack() { return { id: 'rohan', name: 'Rohan Shah', role: 'Startup mentor', kind: 'mentor', cadenceDays: 14, cadenceLabel: 'Every alternate Saturday', anchor: '2026-06-20', location: 'Ahmedabad', color: 'var(--orange)' }; }

  scheduleFor(t) {
    if (!(t.kind === 'mentor' || t.kind === 'recurring') || !t.anchor) return [];
    const cad = t.cadenceDays || 14;
    const anchor = new Date(t.anchor + 'T00:00:00');

    const back = t.kind === 'mentor' ? 5 : 2;
    let d = new Date(anchor); d.setDate(d.getDate() - back * cad);
    const out = []; let n = 1; let guard = 0;
    while (d <= end && guard++ < 200) { out.push({ date: this.dstr(d), n }); d = new Date(d); d.setDate(d.getDate() + cad); n++; }
    return out;
  }
  trackNoteKey(t, date) { return t.id + '|' + date; }

  /* ---------------- habits data + state ---------------- */
  get habitsData() { return window.VIVARTAM.habitsData; }
  habitStage(k, id) { return this.state.habitStatus[k + ':' + id] || 'todo'; }
  isHabitDone(k, id) { return this.habitStage(k, id) === 'done'; }
  setStage(k, id, stage) { this.setState(s => ({ habitStatus: Object.assign({}, s.habitStatus, { [k + ':' + id]: stage }) })); }
  // Tap on a card (card/column views): simple done ↔ todo toggle.
  toggleHabit(k, id) { this.setStage(k, id, this.isHabitDone(k, id) ? 'todo' : 'done'); }
  // Kanban arrows: step one stage along todo → wip → done.
  moveStage(k, id, dir) {
    const order = ['todo', 'wip', 'done'];
    const i = Math.max(0, Math.min(order.length - 1, order.indexOf(this.habitStage(k, id)) + dir));
    this.setStage(k, id, order[i]);
  }
  /* ---- Kanban drag & drop ---- */
  onCardDragStart(e, k, id) {
    try { e.dataTransfer.setData('text/plain', k + '|' + id); e.dataTransfer.effectAllowed = 'move'; } catch (_) {}
    this.setState({ dragHabit: { k: k, id: id }, dragOver: null });
  }
  onCardDragEnd() { this.setState({ dragHabit: null, dragOver: null }); }
  onLaneDragOver(e, p, kind) {
    const d = this.state.dragHabit;
    if (!d || d.k !== p.key || !this.canEditFounder(p.key)) return; // only within your own board
    e.preventDefault();
    try { e.dataTransfer.dropEffect = 'move'; } catch (_) {}
    const tgt = p.key + ':' + kind;
